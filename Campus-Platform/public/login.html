<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Campus Intelligence System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
    }

    /* Navbar */
    #navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 70px;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 60px;
      z-index: 1000;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
    }

    /* Login Section */
    .login-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 70px;
      padding: 60px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow: hidden;
    }

    .login-container::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 2px, transparent 2px);
      background-size: 40px 40px;
      animation: drift 20s linear infinite;
    }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    .login-box {
      position: relative;
      background: rgba(255,255,255,0.98);
      padding: 50px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
      animation: slideUp 0.8s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .login-header h1 {
      font-size: 30px;
      margin-bottom: 8px;
      color: #222;
    }

    .login-header p {
      font-size: 14px;
      color: #666;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #444;
    }

    .form-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(102,126,234,0.3);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(102,126,234,0.4);
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }

    .login-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

<header id="navbar">
  <div class="logo">Campus Intelligence</div>
</header>

<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <h1>Login to Continue</h1>
      <p>Access campus resources and community updates</p>
    </div>
    <!-- TABS -->
    <div style="display:flex; margin-bottom:18px; border-radius:10px; overflow:hidden; border:1px solid #e0e0e0;">
      <button type="button" id="loginTab" onclick="showTab('login')" style="flex:1; padding:10px; border:none; background:#667eea; color:white; font-weight:600; cursor:pointer;">Login</button>
      <button type="button" id="registerTab" onclick="showTab('register')" style="flex:1; padding:10px; border:none; background:#f5f5f5; color:#555; font-weight:500; cursor:pointer;">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">College Email</label>
        <input type="email" id="email" placeholder="firstname.lastname2024@vitstudent.ac.in" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" onsubmit="handleRegister(event)" style="display:none; margin-top:5px;">
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label for="regEmail">VIT Student Email</label>
        <input type="email" id="regEmail" placeholder="firstname.lastname2024@vitstudent.ac.in" required>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Create a password" required>
      </div>
      <div class="form-group">
        <label for="regPassword2">Confirm Password</label>
        <input type="password" id="regPassword2" placeholder="Re-enter password" required>
      </div>

      <button type="submit" class="login-btn">Create Account</button>
      <p style="font-size:12px;color:#777;margin-top:10px;">
        Note: Only VIT student emails ending with <strong>20XX@vitstudent.ac.in</strong> are allowed (example: <strong>firstname.lastname2024@vitstudent.ac.in</strong>).
      </p>
    </form>

    <div class="login-footer">
      Return to <a href="index.html">Home</a>
    </div>
  </div>
</div>

<script>
  function showTab(tab) {
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    if (tab === "login") {
      loginTab.style.background = "#667eea";
      loginTab.style.color = "white";
      registerTab.style.background = "#f5f5f5";
      registerTab.style.color = "#555";
      loginForm.style.display = "block";
      registerForm.style.display = "none";
    } else {
      registerTab.style.background = "#667eea";
      registerTab.style.color = "white";
      loginTab.style.background = "#f5f5f5";
      loginTab.style.color = "#555";
      loginForm.style.display = "none";
      registerForm.style.display = "block";
    }
  }

  // Simple client-side VIT email check (same idea as backend)
  function isValidVitEmail(email) {
    if (!email) return false;
    const lower = email.trim().toLowerCase();
    if (!lower.endsWith("@vitstudent.ac.in")) return false;
    const localPart = lower.split("@")[0];
    return /20\d{2}$/.test(localPart);
  }

  async function handleLogin(event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      alert("Please fill all fields.");
      return;
    }

    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
        credentials: "include"
      });
      const data = await res.json();

      if (!data.success) {
        alert(data.message || "Login failed.");
        return;
      }

      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("userEmail", data.user.email);
      localStorage.setItem("userName", data.user.name || "");
      localStorage.setItem("userRole", data.user.role || "student");
      localStorage.setItem("userId", data.user.id || "");

      window.location.href = "index.html";
    } catch (err) {
      console.error(err);
      alert("Network error. Is the server running on port 3000?");
    }
  }

  async function handleRegister(event) {
    event.preventDefault();

    const name = document.getElementById("regName").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const password2 = document.getElementById("regPassword2").value;

    if (!name || !email || !password || !password2) {
      alert("Please fill all fields.");
      return;
    }

    if (!isValidVitEmail(email)) {
      alert("Use your VIT student email ending with 20XX@vitstudent.ac.in (e.g. firstname.lastname2024@vitstudent.ac.in).");
      return;
    }

    if (password.length < 6) {
      alert("Password should be at least 6 characters.");
      return;
    }

    if (password !== password2) {
      alert("Passwords do not match.");
      return;
    }

    try {
      const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password }),
        credentials: "include"
      });
      const data = await res.json();

      if (!data.success) {
        alert(data.message || "Registration failed.");
        return;
      }

      // Save to localStorage (auto-login)
      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("userEmail", data.user.email);
      localStorage.setItem("userName", data.user.name || "");
      localStorage.setItem("userRole", data.user.role || "student");
      localStorage.setItem("userId", data.user.id || "");

      alert("Account created successfully. Welcome!");
      window.location.href = "index.html";
    } catch (err) {
      console.error(err);
      alert("Network error. Is the server running on port 3000?");
    }
  }

  // Default tab
  showTab('login');
</script>

</body>
</html>
