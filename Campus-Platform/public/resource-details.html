<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resource Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Segoe UI",sans-serif;
    }

    body{
      background:white;
      color:black;
    }

    /* NAVBAR */
    #navbar{
      position:fixed;
      top:0;
      width:100%;
      height:70px;
      background:black;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 60px;
      z-index:1000;
    }

    #navbar nav a{
      color:white;
      text-decoration:none;
      margin-left:28px;
      font-size:14px;
      transition:0.3s;
    }

    #navbar nav a:hover{
      opacity:0.7;
    }

    /* HERO */
    .hero{
      margin-top:70px;
      padding:80px 20px;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:white;
      text-align:center;
    }

    .hero h1{
      font-size:38px;
      margin-bottom:10px;
    }

    .hero p{
      opacity:0.9;
    }

    /* CONTENT */
    .content{
      max-width:1100px;
      margin:60px auto;
      padding:0 20px;
    }

    .info-card{
      background:white;
      border-radius:18px;
      padding:30px;
      box-shadow:0 20px 45px rgba(0,0,0,0.08);
      margin-bottom:30px;
    }

    .info-card h2{
      margin-bottom:15px;
      font-size:22px;
    }

    .floor-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .floor-card{
      background:#f8f9ff;
      border-radius:14px;
      padding:20px;
      transition:0.3s;
    }

    .floor-card:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    .badge{
      display:inline-block;
      padding:4px 10px;
      border-radius:20px;
      font-size:12px;
      margin-top:10px;
    }

    .open{
      background:#d4edda;
      color:#155724;
    }

    .closed{
      background:#f8d7da;
      color:#721c24;
    }

  </style>
</head>

<body>

<header id="navbar">
  <div><strong>Campus Intelligence</strong></div>
  <nav>
    <a href="index.html">Home</a>
    <a href="resources.html">Resources</a>
    <a href="community.html">Community</a>
    <a href="noticeboard.html">Noticeboard</a>
  </nav>
</header>

<section class="hero">
  <h1 id="resourceName">Loading...</h1>
  <p id="resourceDesc"></p>
</section>

<div class="content">

  <!-- Basic Info -->
  <div class="info-card">
    <h2>Operational Information</h2>
    <p><strong>Timings:</strong> <span id="timings"></span></p>
    <p><strong>Contact:</strong> <span id="contact"></span></p>
    <span id="statusBadge"></span>
  </div>

  <!-- Floors -->
  <div class="info-card">
    <h2>Floor-wise Facilities</h2>
    <div class="floor-grid" id="floorsContainer"></div>
  </div>

</div>

<script>
  (async function(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      document.getElementById("resourceName").innerText = "Resource Not Found";
      return;
    }

    try {
      const res = await fetch("/api/resources/" + id, { credentials: "include" });
      const json = await res.json();

      if (!json.success || !json.data) {
        document.getElementById("resourceName").innerText = "Resource Not Found";
        return;
      }

      const d = json.data;
      document.getElementById("resourceName").innerText = d.name;
      document.getElementById("resourceDesc").innerText = d.description || "";
      document.getElementById("timings").innerText = d.timings || "—";
      document.getElementById("contact").innerText = d.contact_info || "—";

      const badge = document.getElementById("statusBadge");
      badge.className = "badge " + (d.is_open ? "open" : "closed");
      badge.innerText = d.is_open ? "Open" : "Closed";

      const floorsContainer = document.getElementById("floorsContainer");
      floorsContainer.innerHTML = "";
      if (d.floor || d.description) {
        const div = document.createElement("div");
        div.className = "floor-card";
        div.innerHTML = "<h4>" + (d.floor ? "Floor: " + d.floor : "Details") + "</h4><p>" + (d.description || d.type || "") + "</p>";
        floorsContainer.appendChild(div);
      }
    } catch (err) {
      console.error(err);
      document.getElementById("resourceName").innerText = "Resource Not Found";
    }
  })();
</script>

</body>
</html>
