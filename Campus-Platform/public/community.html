<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Segoe UI",sans-serif;
    }

    body{
      background:white;
      color:black;
    }

    /* NAVBAR */
    #navbar{
      position:fixed;
      top:0;
      width:100%;
      height:70px;
      background:black;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 60px;
      z-index:1000;
    }

    #navbar nav a{
      color:white;
      text-decoration:none;
      margin-left:28px;
      font-size:14px;
      transition:0.3s;
    }

    #navbar nav a:hover{
      opacity:0.7;
    }

    /* HERO */
    .hero{
      margin-top:70px;
      padding:80px 20px;
      background:linear-gradient(135deg,#9f44d3 0%,#6a11cb 100%);
      color:white;
      text-align:center;
    }

    .hero h1{
      font-size:38px;
      margin-bottom:10px;
    }

    /* FILTER BAR */
    .filters{
      max-width:1100px;
      margin:40px auto;
      padding:0 20px;
      display:flex;
      flex-wrap:wrap;
      gap:15px;
      align-items:center;
    }

    .filters input,
    .filters select{
      padding:10px 12px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
    }

    .toggle-btn{
      padding:10px 18px;
      border-radius:20px;
      border:none;
      cursor:pointer;
      background:#eee;
      transition:0.3s;
    }

    .toggle-btn.active{
      background:black;
      color:white;
    }

    /* CONTENT GRID */
    .content{
      max-width:1100px;
      margin:40px auto;
      padding:0 20px;
      display:grid;
      gap:25px;
    }

    .card{
      background:white;
      border-radius:16px;
      padding:25px;
      box-shadow:0 18px 40px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 28px 60px rgba(0,0,0,0.12);
    }

    .category-tag{
      display:inline-block;
      background:#e0e0ff;
      padding:4px 10px;
      border-radius:20px;
      font-size:12px;
      margin-bottom:10px;
      margin-right:8px;
    }

    .priority-badge{
      display:inline-block;
      padding:4px 10px;
      border-radius:20px;
      font-size:11px;
      font-weight:600;
      margin-bottom:10px;
    }

    .priority-normal{
      background:#e8e8e8;
      color:#555;
    }

    .priority-important{
      background:#fff3cd;
      color:#856404;
    }

    .priority-urgent{
      background:#f8d7da;
      color:#721c24;
    }

    .answer-count{
      font-size:12px;
      color:#666;
      margin-top:8px;
    }

    /* FLOATING BUTTON */
    .floating-btn{
      position:fixed;
      bottom:30px;
      right:30px;
      width:60px;
      height:60px;
      border-radius:50%;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:white;
      font-size:30px;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      box-shadow:0 15px 30px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    .floating-btn:hover{
      transform:scale(1.1);
    }

    /* RESPONSIVE */
    @media (max-width:768px){
      #navbar{
        padding:0 20px;
      }

      #navbar nav a{
        margin-left:15px;
        font-size:12px;
      }

      .hero{
        padding:50px 20px;
      }

      .hero h1{
        font-size:28px;
      }

      .filters{
        flex-direction:column;
        align-items:stretch;
      }

      .filters input,
      .filters select,
      .toggle-btn{
        width:100%;
      }

      .content{
        grid-template-columns:1fr;
      }

      .floating-btn{
        width:50px;
        height:50px;
        bottom:20px;
        right:20px;
        font-size:24px;
      }
    }

    @media (max-width:480px){
      #navbar{
        height:60px;
        flex-wrap:wrap;
      }

      #navbar nav{
        display:flex;
        flex-wrap:wrap;
        gap:8px;
      }

      #navbar nav a{
        margin-left:0;
        font-size:11px;
      }

      .hero h1{
        font-size:24px;
      }
    }

  </style>
</head>

<body>

<header id="navbar">
  <div><strong>Campus Intelligence</strong></div>
  <nav>
    <a href="index.html">Home</a>
    <a href="resources.html">Resources</a>
    <a href="noticeboard.html">Noticeboard</a>
    <a href="profile.html">Profile</a>
    <a href="admin.html" id="adminLink" style="display:none;">Admin</a>
  </nav>
</header>

<section class="hero">
  <h1>Community Updates & Queries</h1>
  <p>Structured campus information shared by students</p>
</section>

<!-- FILTER BAR -->
<div class="filters">
  <button class="toggle-btn active" onclick="switchMode('updates')">Updates</button>
  <button class="toggle-btn" onclick="switchMode('queries')">Queries</button>

  <select id="categoryFilter" onchange="renderContent()">
    <option value="">All Categories</option>
    <option value="Classroom">Classroom</option>
    <option value="Library">Library</option>
    <option value="WiFi">WiFi</option>
    <option value="Other">Other</option>
  </select>

  <input type="text" id="searchInput" placeholder="Search posts..." oninput="renderContent()">
</div>

<!-- CONTENT -->
<div class="content" id="contentArea">
</div>

<!-- FLOATING ADD BUTTON -->
<div class="floating-btn" onclick="location.href='add-post.html'">
  +
</div>

<script>
  let currentMode = "updates";

  function escapeHtml(s) {
    if (s == null) return "";
    const div = document.createElement("div");
    div.textContent = s;
    return div.innerHTML;
  }

  async function fetchPosts(){
    const type = currentMode === "updates" ? "update" : "query";
    const search = document.getElementById("searchInput").value.trim();
    const category = document.getElementById("categoryFilter").value;
    
    let url = "/api/posts?type=" + type;
    if (search) {
      url += "&search=" + encodeURIComponent(search);
    }
    if (category) {
      url += "&category=" + encodeURIComponent(category);
    }
    
    try {
      console.log("Fetching posts from:", url);
      const res = await fetch(url, { credentials: "include" });
      const json = await res.json();
      console.log("Posts response:", json);
      return json.success ? json.data : [];
    } catch (err) {
      console.error("Error fetching posts:", err);
      return [];
    }
  }

  function renderContent(){
    const container = document.getElementById("contentArea");
    container.innerHTML = "<p style='text-align:center;color:#666'>Loading…</p>";

    fetchPosts().then(posts => {
      container.innerHTML = "";
      console.log("Rendering posts:", posts);
      if (posts.length === 0) {
        container.innerHTML = "<p style='text-align:center;color:#666'>No posts yet. Create one using the + button!</p>";
        return;
      }
      posts.forEach(p => {
        const cat = p.category ? "<div class=\"category-tag\">" + escapeHtml(p.category) + "</div>" : "";
        const priority = p.priority || "normal";
        const priorityClass = "priority-" + priority;
        const priorityLabel = priority === "important" ? "Important" : priority === "urgent" ? "Urgent" : "Normal";
        const priorityBadge = "<div class=\"priority-badge " + priorityClass + "\">" + priorityLabel + "</div>";
        
        if (currentMode === "updates") {
          container.innerHTML += "<div class=\"card\">" + cat + priorityBadge + "<p>" + escapeHtml(p.body) + "</p><div class=\"answer-count\">" + escapeHtml(p.author_name || "User") + " · " + new Date(p.created_at).toLocaleString() + "</div></div>";
        } else {
          container.innerHTML += "<div class=\"card\">" + cat + priorityBadge + "<h3>" + escapeHtml(p.title) + "</h3><p>" + escapeHtml((p.body || "").slice(0, 120)) + ((p.body || "").length > 120 ? "…" : "") + "</p><div class=\"answer-count\">" + escapeHtml(p.author_name || "User") + "</div></div>";
        }
      });
    }).catch((err) => {
      console.error("Render error:", err);
      container.innerHTML = "<p style='text-align:center;color:#c00'>Could not load posts. Check console for details.</p>";
    });
  }

  function switchMode(mode){
    currentMode = mode;
    document.querySelectorAll(".toggle-btn").forEach(btn=>btn.classList.remove("active"));
    event.target.classList.add("active");

    // Search works for both modes now, but change placeholder
    const searchInput = document.getElementById("searchInput");
    searchInput.placeholder = mode === "queries" ? "Search queries..." : "Search updates...";

    renderContent();
  }

  renderContent();
</script>

<script src="js/admin-nav.js"></script>
</body>
</html>
